<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <script src="../shared.js"></script>
    <meta name="theme-color" content="#1E293B" />
    <title>ARPS — Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["DM Sans", "Segoe UI", "system-ui", "sans-serif"],
            },
          },
        },
      };
    </script>

    <link rel="stylesheet" href="../shared.css" />
    <link rel="stylesheet" href="./css/dashboard.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
  </head>
  <body class="bg-[#F8FAFC] font-sans">
    <div class="flex h-screen overflow-hidden">
      <!-- Sidebar -->
      <aside
        class="w-[280px] bg-[#0F172A] text-white flex flex-col shrink-0 shadow-2xl z-50"
      >
        <div class="px-6 py-8 border-b border-white/10">
          <div class="sidebar-brand">
            <div class="sidebar-brand-logo">
              <img src="../Images/ARPLOGO.png" alt="ARPS logo" />
            </div>
            <div class="sidebar-brand-copy">
              <h3>ARPS</h3>
              <p>Admin Panel</p>
            </div>
          </div>
        </div>

        <nav class="px-4 py-6 flex-1 gap-1 flex flex-col">
          <a href="./dashboard.html" class="sidebar-item active">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"
              />
            </svg>
            Dashboard
          </a>

          <a href="./map.html" class="sidebar-item">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"
              />
            </svg>
            Live Map
          </a>

          <a href="./alerts.html" class="sidebar-item">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
              />
            </svg>
            Alerts
          </a>

          <a href="./centers.html" class="sidebar-item">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"
              />
            </svg>
            Centers
          </a>

          <a href="./weather.html" class="sidebar-item">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"
              />
            </svg>
            Weather
          </a>

          <a href="./approvals.html" class="sidebar-item">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
              />
            </svg>
            User Approvals
          </a>

          <a href="./settings.html" class="sidebar-item">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3" />
              <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.6 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9c.26.604.852.997 1.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z" />
            </svg>
            Settings
          </a>
        </nav>
      </aside>

      <!-- Main -->
      <main class="flex-1 overflow-auto p-8">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
          <div>
            <h1 class="text-3xl font-black text-slate-900 tracking-tight">
              Operations Dashboard
            </h1>
            <p class="text-[14px] text-slate-500 font-medium mt-1.5">
              Real-time emergency monitoring
            </p>
          </div>

          <div class="flex items-center gap-3">
            <div
              class="flex items-center gap-1.5 bg-red-100 px-3.5 py-2 rounded-[10px]"
            >
              <span class="relative flex h-2 w-2">
                <span
                  class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"
                ></span>
                <span
                  class="relative inline-flex rounded-full h-2 w-2 bg-red-600"
                ></span>
              </span>
              <span class="text-xs font-semibold text-red-900"
                >SIGNAL #2 ACTIVE</span
              >
            </div>
            <div class="text-[13px] text-slate-400" id="currentDate"></div>
          </div>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-4 gap-4 mb-8" id="statsGrid"></div>

        <!-- Content Grid -->
        <div class="grid grid-cols-[1fr_380px] gap-5">
          <!-- Incidents -->
          <div
            class="bg-white rounded-3xl border border-slate-200/60 shadow-sm overflow-hidden"
          >
            <div id="incidentList">
              <div
                class="px-5 py-4 border-b border-slate-200 flex justify-between items-center"
              >
                <h3 class="text-base font-bold">Live Incidents</h3>

                <div class="flex items-center gap-3">
                  <select
                    id="filterStatus"
                    class="text-xs border border-slate-200 rounded-lg px-2 py-1.5 font-sans bg-white outline-none"
                  >
                    <option value="">All Status</option>
                    <option>Pending</option>
                    <option>Responding</option>
                    <option>Resolved</option>
                  </select>

                  <div class="flex items-center gap-1.5">
                    <span class="relative flex h-2 w-2">
                      <span
                        class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"
                      ></span>
                      <span
                        class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"
                      ></span>
                    </span>
                    <span class="text-xs text-slate-400">Real-time</span>
                  </div>
                </div>
              </div>

              <div id="rowsContainer"></div>
            </div>

            <div id="incidentDetail" class="hidden"></div>
          </div>

          <!-- Right Panel -->
          <div class="flex flex-col gap-4">
            <div
              class="bg-white rounded-3xl border border-slate-200/60 shadow-sm overflow-hidden"
            >
              <div class="px-4 py-3.5 border-b border-slate-200">
                <h3 class="text-sm font-bold">Incident Map</h3>
              </div>

              <div style="position: relative; height: 280px">
                <div id="dashboardMap" style="height: 280px; width: 100%"></div>
                <div
                  style="
                    position: absolute;
                    bottom: 8px;
                    right: 8px;
                    z-index: 500;
                    background: rgba(255, 255, 255, 0.92);
                    border-radius: 6px;
                    padding: 3px 8px;
                    font-size: 10px;
                    color: #94a3b8;
                    font-weight: 600;
                    pointer-events: none;
                  "
                >
                  Live SOS Map
                </div>
              </div>
            </div>

            <div class="rounded-2xl p-4 border border-blue-300 ai-summary-card">
              <div class="flex items-center gap-2 mb-2.5">
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="#1D4ED8"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"
                  />
                </svg>
                <span class="text-[13px] font-bold text-blue-900"
                  >AI Situation Summary</span
                >
              </div>
              <p
                class="text-xs text-blue-800 leading-relaxed"
                id="aiSummary"
              ></p>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Contact Modal -->
    <div id="contactModal" class="hidden contact-modal">
      <div
        class="fixed inset-0 bg-black/50 flex items-center justify-center"
        id="contactOverlay"
      >
        <div
          class="bg-white rounded-2xl p-8 max-w-sm w-full mx-4 animate-slideUp"
          id="contactDialog"
        >
          <h3 class="text-lg font-bold mb-1">Contact Reporter</h3>
          <p class="text-sm text-slate-400 mb-4" id="contactInfo"></p>

          <div class="flex flex-col gap-2">
            <button
              id="callBtn"
              class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold text-sm py-3 rounded-xl btn-press border-none font-sans flex items-center justify-center gap-2"
            >
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="#fff"
                stroke-width="2"
              >
                <path
                  d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"
                />
              </svg>
              Call Now
            </button>

            <button
              id="smsBtn"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold text-sm py-3 rounded-xl btn-press border-none font-sans flex items-center justify-center gap-2"
            >
              Send SMS
            </button>

            <button
              id="cancelContactBtn"
              class="w-full bg-white border border-slate-200 shadow-sm text-slate-700 font-semibold text-sm py-3 rounded-xl btn-press font-sans"
            >
              Cancel
            </button>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="../user/js/map-common.js"></script>
    <script type="module" src="./js/dashboard.js"></script>
  </body>
</html>
