<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="../shared.js"></script>
  <meta name="theme-color" content="#1E293B">
  <title>ARPS — Account Under Review</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], } } },
    };
  </script>
</head>
<body class="bg-[#f1f5f9] flex justify-center items-center min-h-screen m-0 p-5">

<div class="bg-white w-full max-w-[420px] rounded-[28px] shadow-[0_25px_50px_-12px_rgba(15,23,42,0.15)] overflow-hidden relative text-center p-8 flex flex-col items-center">
  
  <div class="w-24 h-24 bg-amber-50 text-amber-500 rounded-full flex items-center justify-center mb-6 shadow-xl shadow-amber-100/50 relative">
    <div class="absolute inset-0 border-4 border-amber-300 rounded-full animate-ping opacity-20"></div>
    <i class="ph ph-hourglass-high text-5xl animate-pulse"></i>
  </div>
  
  <h2 class="text-3xl font-extrabold text-slate-800 mb-3 tracking-tight">Under Review</h2>
  <p class="text-slate-500 leading-relaxed font-medium mb-8">
    Hi <strong class="text-slate-700" id="userName">User</strong>, our administrators are currently verifying your supplied ID to ensure community safety. This usually takes just a few minutes.
  </p>
  
  <div class="w-full bg-slate-50 rounded-2xl p-4 border border-slate-100 mb-8 flex flex-col gap-3">
    <div class="flex items-center justify-between">
      <span class="text-sm font-bold text-slate-500">ID Verification</span>
      <span class="text-xs font-black text-amber-600 bg-amber-100 px-2.5 py-1 rounded-full uppercase tracking-wider">Pending</span>
    </div>
    <div class="flex items-center justify-between">
      <span class="text-sm font-bold text-slate-500">Selfie with ID</span>
      <span class="text-xs font-black text-emerald-600 bg-emerald-100 px-2.5 py-1 rounded-full uppercase tracking-wider flex items-center gap-1"><i class="ph-bold ph-check"></i> Submitted</span>
    </div>
    <div class="flex items-center justify-between">
      <span class="text-sm font-bold text-slate-500">Personal Info</span>
      <span class="text-xs font-black text-emerald-600 bg-emerald-100 px-2.5 py-1 rounded-full uppercase tracking-wider flex items-center gap-1"><i class="ph-bold ph-check"></i> Done</span>
    </div>
    <div class="flex items-center justify-between">
      <span class="text-sm font-bold text-slate-500">Terms Accepted</span>
      <span class="text-xs font-black text-emerald-600 bg-emerald-100 px-2.5 py-1 rounded-full uppercase tracking-wider flex items-center gap-1"><i class="ph-bold ph-check"></i> Done</span>
    </div>
  </div>
  
  <div class="w-full flex flex-col gap-3">
    <button onclick="checkStatus()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 rounded-xl shadow-lg transition-transform hover:-translate-y-0.5 btn-press flex items-center justify-center gap-2">
      <i class="ph-bold ph-arrows-clockwise text-lg"></i> Check Status Now
    </button>
    <button onclick="logout()" class="w-full bg-white border border-slate-200 text-slate-600 font-bold py-3.5 rounded-xl hover:bg-slate-50 transition-colors btn-press">
      Sign Out
    </button>
  </div>
  
</div>

<script type="module">
  import { db } from "../firebase-config.js";
  import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  const session = JSON.parse(localStorage.getItem('arps_session') || 'null');
  if (!session || !session.uid) window.location.href = 'loginpage.html';

  document.getElementById('userName').textContent = session.name || 'Resident';

  function getProfile() {
    try { return JSON.parse(localStorage.getItem('arps_profile_' + session.uid) || '{}'); } catch(e) { return {}; }
  }

  // Real-time listener for approval status from Firestore
  const unsub = onSnapshot(doc(db, "users", session.uid), (docSnapshot) => {
    if (docSnapshot.exists()) {
      const data = docSnapshot.data();
      if (data.status === 'approved') {
        const profile = getProfile();
        profile.status = 'approved';
        localStorage.setItem('arps_profile_' + session.uid, JSON.stringify(profile));
        window.location.href = 'home.html';
      } else if (data.status === 'rejected') {
        const profile = getProfile();
        profile.status = 'rejected';
        localStorage.setItem('arps_profile_' + session.uid, JSON.stringify(profile));
        alert("Your registration has been rejected by the administrator. Please log in again or contact support.");
        logout();
      }
    }
  });

  window.checkStatus = function() {
    // Manual check just triggers a UI spinner since Firestore is already real-time
    const btn = document.querySelector('button[onclick="checkStatus()"]');
    const orig = btn.innerHTML;
    btn.innerHTML = '<span class="animate-spin inline-block w-5 h-5 border-[3px] border-slate-400 border-t-white rounded-full"></span>';
    setTimeout(() => { btn.innerHTML = orig; }, 800);
  };

  window.logout = function() {
    localStorage.removeItem('arps_session');
    window.location.href = 'loginpage.html';
  };
</script>

</body>
</html>
